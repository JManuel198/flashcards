<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Flashcards</title>

    <!-- Google Fonts: Space Grotesk (UI) + Noto Sans JP (contenido japonés) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&display=swap"
    />

    <!-- Sistema de diseño y estilos base -->
    <link rel="stylesheet" href="css/tokens.css" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/components/card.css" />
  </head>

  <body>
    <div class="app">
      <header class="app__header">
        <!-- Navegación principal — se poblará desde JS en pasos posteriores -->
        <nav class="nav" aria-label="Navegación principal"></nav>
      </header>

      <!-- Área de vistas. Cada vista es una cáscara semántica vacía;
           el router (Paso 2) mostrará una y ocultará el resto. -->
      <main class="app__content" id="content">
        <section class="view" id="view-home" data-view="home" aria-label="Inicio" hidden></section>
        <section class="view" id="view-deck" data-view="deck" aria-label="Mazo" hidden></section>
        <section class="view" id="view-study" data-view="study" aria-label="Estudio" hidden></section>
        <section class="view" id="view-summary" data-view="summary" aria-label="Resumen de la sesión" hidden></section>
        <section class="view" id="view-progress" data-view="progress" aria-label="Progreso" hidden></section>
      </main>
    </div>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
